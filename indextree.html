<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The North Pine Overlook — all my links in one place.">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#f3f3f1">
  <meta property="og:title" content="The North Pine Overlook | Links">
  <meta property="og:description" content="All my links in one place.">
  <meta property="og:type" content="website">
  <title>The North Pine Overlook | Links</title>
  <style>
    /* ------------------------------------------------------------------
       Classic Linktree light theme
       ------------------------------------------------------------------ */
    :root {
      --bg: #f3f3f1;               /* subtle warm near-white */
      --ink: #1e2330;              /* primary dark text */
      --ink-soft: #4d535f;         /* bio / secondary text (AA on --bg) */
      --ink-faint: #5f6672;        /* footer / socials (AA on --bg) */
      --btn-bg: #ffffff;
      --btn-border: rgba(30, 35, 48, 0.08);
      --btn-shadow: 0 2px 8px rgba(30, 35, 48, 0.06);
      --btn-shadow-hover: 0 10px 24px rgba(30, 35, 48, 0.12);
      --avatar-bg-1: #2c3345;
      --avatar-bg-2: #1a1f2b;
      --toast-bg: #1e2330;
      --toast-ink: #ffffff;
      --focus: #1e2330;
      --radius-pill: 999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    [hidden] { display: none !important; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 56px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---------------- Profile header ---------------- */

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--avatar-bg-1), var(--avatar-bg-2));
      color: #ffffff;
      font-size: 38px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 14px rgba(30, 35, 48, 0.14);
    }

    .profile h1 {
      margin-top: 16px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .profile .handle {
      margin-top: 2px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-faint);
    }

    .profile .bio {
      margin-top: 8px;
      font-size: 15px;
      color: var(--ink-soft);
      max-width: 42ch;
      overflow-wrap: break-word;
    }

    .noscript-note {
      margin-top: 36px;
      font-size: 15px;
      color: var(--ink-soft);
      text-align: center;
    }

    /* ---------------- Link buttons ---------------- */

    .links-nav { width: 100%; }

    .links {
      list-style: none;
      width: 100%;
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-item {
      position: relative;
      width: 100%;
      transition: transform 200ms ease;
    }

    .link-btn {
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      width: 100%;
      min-height: 56px;
      padding: 8px 6px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: var(--radius-pill);
      box-shadow: var(--btn-shadow);
      color: var(--ink);
      text-decoration: none;
      transition: box-shadow 200ms ease, border-color 200ms ease;
    }

    .link-item:hover,
    .link-item:focus-within { transform: translateY(-2px) scale(1.015); }
    .link-item:active { transform: translateY(0) scale(0.99); }
    .link-item:hover .link-btn,
    .link-item:focus-within .link-btn {
      box-shadow: var(--btn-shadow-hover);
      border-color: rgba(30, 35, 48, 0.14);
    }

    .link-btn:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .link-btn .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-btn .btn-icon svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .link-btn .btn-label {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ---------------- Share (copy) button ---------------- */

    .share-btn {
      position: absolute;
      top: 50%;
      right: 6px;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 150ms ease, color 150ms ease,
                  opacity 150ms ease, visibility 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .share-btn svg {
      width: 17px;
      height: 17px;
      display: block;
    }

    .share-btn:hover,
    .share-btn:focus-visible {
      background: rgba(30, 35, 48, 0.07);
      color: var(--ink);
    }

    .share-btn:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    /* Desktop with a real pointer: reveal the share icon on hover/focus.
       Touch devices keep it always visible and tappable. visibility:hidden
       (not just opacity) keeps the hidden button from intercepting taps on
       hover-capable touchscreens and out of the accessibility tree. */
    @media (hover: hover) and (pointer: fine) {
      .share-btn { opacity: 0; visibility: hidden; }
      .link-item:hover .share-btn,
      .link-item:focus-within .share-btn { opacity: 1; visibility: visible; }
    }

    /* ---------------- Social icon row ---------------- */

    .socials {
      margin-top: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: var(--ink-faint);
      transition: color 150ms ease, background-color 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .socials a:hover,
    .socials a:focus-visible {
      color: var(--ink);
      background: rgba(30, 35, 48, 0.06);
    }

    .socials a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .socials svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    /* ---------------- Footer ---------------- */

    .foot {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      color: var(--ink-faint);
    }

    .foot .wordmark {
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink-soft);
    }

    /* ---------------- Toast ---------------- */

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%) translateY(16px);
      background: var(--toast-bg);
      color: var(--toast-ink);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      box-shadow: 0 8px 24px rgba(30, 35, 48, 0.25);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease, visibility 220ms ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* ---------------- Reduced motion ---------------- */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
      .link-item:hover,
      .link-item:focus-within,
      .link-item:active { transform: none; }
      .toast,
      .toast.show { transform: translateX(-50%); }
    }
  </style>
</head>

        '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98"/><path d="M15.41 6.51l-6.82 3.98"/></svg>'
    };

    /* ---------- clipboard: navigator.clipboard with execCommand fallback ---------- */

    function copyText(text) {
      return new Promise(function (resolve) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(
            function () { resolve(true); },
            function () { resolve(legacyCopy(text)); }
          );
        } else {
          resolve(legacyCopy(text));
        }
      });
    }

    function legacyCopy(text) {
      var prevFocus = document.activeElement;
      var selection = document.getSelection();
      var prevRange = selection && selection.rangeCount > 0 ? selection.getRangeAt(0) : null;

      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '-9999px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      var ok = false;
      try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
      document.body.removeChild(ta);

      if (prevRange && selection) {
        selection.removeAllRanges();
        selection.addRange(prevRange);
      }
      if (prevFocus && typeof prevFocus.focus === 'function') prevFocus.focus();
      return ok;
    }

    /* ---------- toast ---------- */

    var toastEl = document.getElementById('toast');
    var toastTimer = null;

    function showToast(message) {
      /* Clear then force a reflow so screen readers re-announce repeats. */
      toastEl.textContent = '';
      void toastEl.offsetWidth;
      toastEl.textContent = message;
      toastEl.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        toastEl.classList.remove('show');
      }, 1800);
    }

    /* ---------- render ---------- */

    function iconMarkup(name) {
      return ICONS[name] || ICONS.globe;
    }

    function renderProfile() {
      var initials = PROFILE.initials || (PROFILE.name || '').trim().split(/\s+/)
        .slice(0, 2)
        .map(function (word) { return word.charAt(0); })
        .join('')
        .toUpperCase();
      document.getElementById('avatar').textContent = initials || '?';
      document.getElementById('profile-name').textContent = PROFILE.name;
      document.getElementById('profile-handle').textContent = PROFILE.handle;
      document.getElementById('profile-bio').textContent = PROFILE.bio;
      document.getElementById('footer-name').textContent = PROFILE.name;
      document.getElementById('footer-year').textContent = String(new Date().getFullYear());
      document.title = PROFILE.name + ' (' + PROFILE.handle + ') | Links';
    }

    function renderLinks() {
      var list = document.getElementById('link-list');
      LINKS.forEach(function (link) {
        var li = document.createElement('li');
        li.className = 'link-item';

        var a = document.createElement('a');
        a.className = 'link-btn';
        a.href = link.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        var iconSpan = document.createElement('span');
        iconSpan.className = 'btn-icon';
        iconSpan.setAttribute('aria-hidden', 'true');
        iconSpan.innerHTML = iconMarkup(link.icon);

        var labelSpan = document.createElement('span');
        labelSpan.className = 'btn-label';
        labelSpan.textContent = link.label;

        var spacer = document.createElement('span');
        spacer.setAttribute('aria-hidden', 'true');

        a.appendChild(iconSpan);
        a.appendChild(labelSpan);
        a.appendChild(spacer);

        var share = document.createElement('button');
        share.type = 'button';
        share.className = 'share-btn';
        share.setAttribute('aria-label', 'Copy link to ' + link.label);
        share.innerHTML = ICONS.share;
        share.addEventListener('click', function (event) {
          event.preventDefault();
          event.stopPropagation();
          copyText(link.url).then(function (ok) {
            showToast(ok ? 'Copied!' : 'Copy failed');
          });
        });

        li.appendChild(a);
        li.appendChild(share);
        list.appendChild(li);
      });
      if (LINKS.length === 0) document.getElementById('links-nav').hidden = true;
    }

    function renderSocials() {
      var row = document.getElementById('social-list');
      SOCIALS.forEach(function (item) {
        var a = document.createElement('a');
        a.href = item.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.setAttribute('aria-label', item.label);
        a.innerHTML = iconMarkup(item.icon);
        row.appendChild(a);
      });
      if (SOCIALS.length === 0) row.hidden = true;
    }

    renderProfile();
    renderLinks();
    renderSocials();
  </script>
</body>
</html>
